<text x="61.0" y="107.0" font-family="Arial, Helvetica, sans-serif" font-size="7.8" font-weight="700" fill="#17212b" text-anchor="start">Public bulk RNA recurrence</text>
<text x="61.0" y="118.0" font-family="Arial, Helvetica, sans-serif" font-size="6.2" font-weight="400" fill="#52616f" text-anchor="start">7 cohorts; 660 samples, 499 sepsis; recurrent</text>
<text x="61.0" y="125.4" font-family="Arial, Helvetica, sans-serif" font-size="6.2" font-weight="400" fill="#52616f" text-anchor="start">inflammatory/MHC-II inverse coupling</text>
