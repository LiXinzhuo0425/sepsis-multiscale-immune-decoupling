<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="510.2pt" height="425.2pt" viewBox="0 0 510.2 425.2">
<desc>Supplementary Figure S1. Evidence hierarchy and claim-boundary matrix. The schematic summarizes the ordered evidence layers and separates allowed association-only interpretations from excluded causal, structural, endotype, clinical-prediction and therapeutic claims.</desc>
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
    <path d="M0,0 L7,3.5 L0,7 Z" fill="#8aa0b5"/>
  </marker>
  <style>
    text { dominant-baseline: alphabetic; }
  </style>
</defs>
<rect x="0" y="0" width="510.2" height="425.2" fill="#ffffff"/>
<text x="18.0" y="25.0" font-family="Arial, Helvetica, sans-serif" font-size="13.2" font-weight="700" fill="#17212b" text-anchor="start">Supplementary Figure S1. Evidence hierarchy and claim-boundary matrix</text>
<text x="18.0" y="43.0" font-family="Arial, Helvetica, sans-serif" font-size="7.8" font-weight="400" fill="#4b5966" text-anchor="start">Evidence layers are ordered by proximity to the manuscript claim; all claims remain association-only.</text>
